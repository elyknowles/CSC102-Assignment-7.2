<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link links the css to this html -->
    <link rel="stylesheet" href="shopping.css">
    <!-- script links the js to this html -->
    <script src="shopping.js"></script>
    <!-- this is whats shown on the page tab -->
    <title>Shopping List</title>
</head>
<!-- onload = in this case, display the array when the page loads -->
<body onload="showArray()">
    <!-- mainContainer allows me to format the contents seperate from the body -->
    <div id="mainContainer">
        <!-- this container holds all the nav buttons -->
        <div id="buttonContainerLeft">
            <button id="home" onclick="homePage()">Home</button>
            <button id="boards" onclick="boardsPage()">Boards</button>
            <button id="game" onclick="gamePage()">Game</button>
            <button id="meme" onclick="memePage()">Meme</button>
            <button id="pal" onclick="palPage()">Palindrome</button>
            <button id="sound" onclick="soundPage()">Space Station</button>
            <button id="table" onclick="tablePage()">Table</button>
        </div>
        <!-- this container holds all the buttons and forms to create the shopping list -->
        <div id="shoppingContainer">
            <!-- used div to create a "container" for all my buttons to make it simpler to format with css -->
            <div id="buttonContainer">
                <!-- onclick calls a js function as named  -->
                <button id="addFront" onclick="addFront()">Add to Top</button>
                <button id="addBack" onclick="addBack()">Add to Bottom</button>
                <button id="remFront" onclick="remFront()">Remove from Top</button>
                <button id="remBack" onclick="remBack()">Remove from Bottom</button>
                <button id="find" onclick="showSearch()">Find Item</button>
                <button id="show" onclick="showArray()">Show Shopping List</button>
            </div>
            <!-- this places onsubmit entries in an unordered list -->
            <ul id="result" class="checklistBox"></ul>

            <!-- this form creates user input field for add to top function -->
            <form id="formAdd" onsubmit="return false" hidden>
                <!-- Add item to top is label placed in front of input field. field entry is text -->
                Add item to Top: <input type="text" id="addItem"/>
                <input type="submit" onclick="addSpecific()"/>
            </form>

            <!-- this form creates user input field for add to bottom function -->
            <form id="formAddBack" onsubmit="return false" hidden>
                <!-- Add item to Bottom is label placed in front of input field. Field entry is text -->
                Add item to Bottom: <input type="text" id="addItemBack"/>
                <input type="submit" onclick="addSpecificBack()"/>
            </form>

            <!-- this form creates user input field for search function -->
            <form id="formSearch" onsubmit="findItem(); return false;" hidden>
                <!-- Enter Item is the label in front of input field. Field entry is text -->
                Enter Item: <input type="text" id="searchName"/>
                <input type="submit" onclick="findItem()"/>
            </form>
        </div>
    </div>
    <!-- this adds the UAT shield logo to the page -->
    <img id="uatLogo"  src="../Home Page Images/UAT_shield.png">
</body>
</html>
