<!-- Doctype to Head is a prepopulated template from typing "!". Script ties html to JS. Link ties html to CSS -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="login.js"></script>
    <link rel="stylesheet" href="login.css">
    <!-- title is whats displayed on tab -->
    <title>Login</title>
</head>
<!-- Body contains all the information displayed on the page -->
<body>
    <!-- h1 is heading to dispaly page title -->
    <h1>Login</h1>
    <!-- all <br> = line break and moves the next item to the next line -->
    <br>
    <!-- form buckets all the information in order to control specfics from js -->
    <form id="credSubmit" onsubmit="return false">
        <!-- div is a contained silo that we can identfy and control independently inside the body -->
        <!-- this is the sile for the user input First Name -->
        <div class="form-row">
            <label for="fName">First Name:</label>
            <input type="text" id="fName"/>
        </div>
        <!-- this is the silo for the user input Last Name -->
        <div class="form-row">
            <label for="lName">Last Name:</label>
            <input type="text" id="lName"/>
        </div>
        <!-- This is the silo for the user input Zip Code -->
        <div class="form-row">
            <label for="zipCode">Zip Code:</label>
            <!-- specifies the zipcode must be a number only -->
            <input type="number" id="zipCode"/> 
        </div>
        <!-- this is the button for the user to click to submit credentials -->
        <input type="submit" onclick="checkCreds()"/>
    </form>
    <br>
    <!-- this paragraph is where the login status is displayed -->
    <p id="status"></p>
</body>
</html>
