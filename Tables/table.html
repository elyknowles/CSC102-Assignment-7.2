<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- links style sheet to html -->
    <link rel="stylesheet" href="table.css">
    <!-- ties js to html -->
    <script src="table.js"></script>
    <title>Table</title>
</head>
<body>
    <!-- mainContainer allows for stronger formatting with simplfied css -->
    <div id="mainContainer">
            <!-- this contains all the nav buttons to simplify css -->
            <div id="buttonContainerLeft">
                <button id="home" onclick="homePage()">Home</button>
                <button id="boards" onclick="boardsPage()">Boards</button>
                <button id="game" onclick="gamePage()">Game</button>
                <button id="meme" onclick="memePage()">Meme</button>
                <button id="pal" onclick="palPage()">Palindrome</button>
                <button id="shop" onclick="shopPage()">Shopping List</button>
                <button id="sound" onclick="soundPage()">Space Station</button>
            </div>
        <!-- tableContainer boxes the table and submit button for easier formatting in css -->
        <div id="tableContainer">   
             <!--this creates a spreadsheet style table  -->
            <table id="apriliaMaint">
                <!-- the specifies the headers of each column -->
                <thead>
                    <!-- column 1 title-->
                    <th id="th1">Service</th>
                    <!-- column 2 title-->
                    <th id="th2">Date</th>
                    <!-- column 3 title-->
                    <th id="th3">Milage</th>
                    <!-- id's assigned to each column for callup and formatting -->
                    <col id="col1">
                    <col id="col2">
                    <col id="col3">
                </thead>
                <!-- this creates the rows of the table -->
                <tbody>
                    <!-- data for first 3 rows are hard coded in. row 4 will be entered with user inputs -->
                    <!-- tr = table row, this is row one and date for each column -->
                    <tr id="tr1">
                        <td> Oil Change & Filter</td>
                        <td> 2025-10-17</td>
                        <td> 3257</td>
                    </tr>
                    <!-- row 2 -->
                    <tr id="tr2">
                        <td> Chain Adjustment</td>
                        <td> 2025-12-09</td>
                        <td> 4789</td>
                    </tr>
                    <!-- row 3 -->
                    <tr id="tr3">
                        <td> Aftermarket Exhuast Install</td>
                        <td> 2026-01-07</td>
                        <td> 4962</td>
                    </tr>
                </tbody>
            </table>
            <!-- line break to create space between bottom of table and submit form/button -->
            <br>
            <!-- user input filds for each data column in the table -->
            <form id="newRow" onsubmit="return false">
                Service: <input type="text" id="service"/>
                Date: <input type="date" id="date"/>
                Milage: <input type="number" id="mileNum"/>
                <!-- the button to enter new data into table at -->
                <button id="rowBTN" type="submit" onclick="addRow()">Log New Service</button>
            </form>
        </div>
    </div>
    <!-- this adds the image whick will used as the background of the page -->
    <img id="image" src="2017rsv4rf.JPEG" alt="background">
    <!-- this adds the UAT shield logo to the page -->
    <img id="uatLogo"  src="../Home Page Images/UAT_shield.png">
</body>
</html>
