<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- script links to js -->
    <script src="pal.js"></script>
    <!-- link pulls the css into the html -->
    <link rel="stylesheet" href="pal.css">
    <!-- title is whats displayed on window tab -->
    <title>Palindrome</title>
</head>
<!-- body is the viewable page -->
<body>
    <!-- mainContainer allows for better formating in css independent of body formatting -->
    <div id="mainContainer">
         <!-- this is the container that holds all the nav buttons for ease of formatting-->
        <div id="buttonContainerLeft">
            <button id="home" onclick="homePage()">Home</button>
            <button id="boards" onclick="boardsPage()">Boards</button>
            <button id="game" onclick="gamePage()">Game</button>
            <button id="meme" onclick="memePage()">Meme</button>
            <button id="shop" onclick="shopPage()">Shopping List</button>
            <button id="sound" onclick="soundPage()">Space Station</button>
            <button id="table" onclick="tablePage()">Table</button>
        </div>
        <!-- rightContainer holds my form and palindrome button to format seperately from the body and nav buttons -->
        <div id="rightContainer">
            <!-- h1 inside rightContainer so title aligns with form formatting -->
            <h1>Palindrome Time</h1>
            <!-- form is a bucket to place information to control seperate from body. similar to div -->
            <form id="stringInput" onsubmit="return false">
                <!-- string 1 is the text next to the input box -->
                Give it a shot: <input type="text" id="initString" required/>
                <!-- the two br moves the submitBtn down two lines -->
                <br>
                <br>
                <!-- input onclick is a button -->
                <input type="submit" value="Check Palindrome" onclick="strings()" id="submitBtn"/>
            </form>
            <br>
            <!-- this div is a place holder for the string results from js -->
            <div id="resultString"> Is it a Palindrome? </div>
            <!-- this image applies to the context of the page and simply fills blank space -->
            <img id="morph" src="morphMEME.jpg" alt="background">
        </div>
       
    </div>
    <!-- this adds the UAT shield logo to the page -->
    <img id="uatLogo"  src="../Home Page Images/UAT_shield.png">
    
</body>
</html>
