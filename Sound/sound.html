<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- this links to the js file -->
    <script src="sound.js"></script>
    <!-- this links to the css file -->
    <link rel="stylesheet" href="sound.css">
    <title>ISS Sound</title>
</head>
<body>
    <!-- h1 is the largest heading -->
    <h1>Sounds of the ISS</h1>
    <!-- audio controls places a browser generated audio controller in the body -->
    <audio controls>
        <!-- source links the sound clip to the audio controller -->
        <source src="sounds/us-lab-background.mp3" type="audio/mpeg"></source>
    </audio controls>
    <!-- this container holds all the nav buttons for simplified formatting in css -->
    <div id="buttonContainerLeft">
        <button id="home" onclick="homePage()">Home</button>
        <button id="boards" onclick="boardsPage()">Boards</button>
        <button id="game" onclick="gamePage()">Game</button>
        <button id="meme" onclick="memePage()">Meme</button>
        <button id="pal" onclick="palPage()">Palindrome</button>
        <button id="shop" onclick="shopPage()">Shopping List</button>
        <button id="table" onclick="tablePage()">Table</button>
    </div>
    <!-- this adds the image whick will used as the background of the page -->
    <img id="image" src="Images/spaceStation.jpg" alt="background">
    <!-- this adds the UAT shield logo to the page -->
    <img id="uatLogo"  src="../Home Page Images/UAT_shield.png">
</body>
</html>
